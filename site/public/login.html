<body class="bg-surface text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopNavBar Component -->
<header class="w-full top-0 sticky z-50 bg-white dark:bg-zinc-950">
<nav class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-bold tracking-tight text-green-700 dark:text-green-500">
                BusGo
            </div>
<div class="hidden md:flex items-center gap-8">
<a class="text-green-700 dark:text-green-500 font-semibold hover:text-green-600 dark:hover:text-green-400 transition-colors active:scale-95 duration-200" href="#">Trang chủ</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-green-600 dark:hover:text-green-400 transition-colors active:scale-95 duration-200" href="#">Lịch trình</a>
<a class="text-slate-500 dark:text-slate-400 hover:text-green-600 dark:hover:text-green-400 transition-colors active:scale-95 duration-200" href="#">Hỗ trợ</a>
</div>

</header>
<main class="flex-grow flex items-center justify-center p-6 sm:p-12">
<div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-surface-container-lowest rounded-xl overflow-hidden editorial-shadow transition-transform hover:-translate-y-1 duration-300">
<!-- Hero Illustration Side -->
<div class="hidden lg:block relative overflow-hidden bg-primary-container/10">
<div class="absolute inset-0 bg-gradient-to-br from-primary/20 to-transparent z-10"></div>
<img alt="Bus interior" class="absolute inset-0 w-full h-full object-cover" data-alt="Modern luxury bus interior with green lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBh6xiGedZC9xntBCAWe7zwTDcHZMH6ymh1WFMmKyqNCgWc_YfoiSsC6pdQvXp9C82_b7ZhtlHF7anPgmKL7gzQDuLfd5SSycz2V-KJhZN5LoQSOe5uH2J23jaPYvph8muF-LMpz6zoHJUG8Ob04xVWxzHamOTmTNr7t5DZvMT1AvUJEmtf4bOErcQavd0lHZgFyj7oV8ua_WbCgbAAtXJdoik7qbtFC1r-9d0Qg9J_tcoz8mgj5DEmCzOUp0Tsx3pFWhy6LeDWifQ"/>
<div class="absolute bottom-12 left-12 right-12 z-20">
<h2 class="text-display-sm font-extrabold text-white drop-shadow-md leading-tight mb-4" style="font-size: 2.5rem;">Hành trình mới,<br/>Trải nghiệm mới</h2>
<p class="text-body-lg text-white/90 font-medium">Khám phá Việt Nam cùng hệ thống đặt vé xe khách hiện đại hàng đầu.</p>
</div>
</div>
<!-- Login Form Side -->
<div class="p-8 sm:p-12 lg:p-16 flex flex-col justify-center">
<div class="mb-10">
<h1 class="text-4xl font-extrabold text-on-surface tracking-tight mb-2">Đăng nhập</h1>
<p class="text-on-surface-variant text-lg">Chào mừng bạn trở lại!</p>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">Email</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-transparent rounded-lg focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all placeholder:text-slate-400" placeholder="Nhập email" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1">Mật khẩu</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border border-transparent rounded-lg focus:border-primary focus:ring-4 focus:ring-primary/10 outline-none transition-all placeholder:text-slate-400" placeholder="Nhập mật khẩu" type="password"/>
</div>
</div>
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer appearance-none w-5 h-5 border-2 border-outline rounded-md checked:bg-primary checked:border-primary transition-all" type="checkbox"/>
<span class="material-symbols-outlined absolute text-white scale-0 peer-checked:scale-100 transition-transform text-xs left-1" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<span class="text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Ghi nhớ đăng nhập</span>
</label>
<a class="text-sm font-semibold text-primary hover:underline decoration-primary/30" href="#">Quên mật khẩu?</a>
</div>
<!-- Primary CTA -->
<button class="w-full py-4 bg-primary text-on-primary font-bold text-lg rounded-xl shadow-lg shadow-primary/20 hover:bg-on-primary-fixed-variant active:scale-[0.98] transition-all transform flex items-center justify-center gap-2" type="submit">
<span>Đăng nhập</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-sm font-medium text-outline">hoặc</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<!-- Social Login -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/50 rounded-xl hover:bg-surface-container-low transition-colors active:scale-95">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBYJGiPb7OyQi-ieX2U-GoqnGW7Jk96pa-TD4kyB-0ck_sI8iNpe2jQ95iZhpZuCZNLTdsK0JVRoSu5en5AudwZ99yZGwHGmkHIg74Ptm_nB7DmPV2Fd8QqS3dWg0ZbvN_F5IOFmmbTRlL33zA78XddRVCthYSvw-jDE7_zuU6rAk_ZT1433bMBkqC0znq2kjkdIomvo5e-s-hgg7W1Y-xkr_rofXM9hjpi9qOwVEbM6tXAQxWXJ3eH9EHOh5R3cbokWtCPuZ9Gjig"/>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/50 rounded-xl hover:bg-surface-container-low transition-colors active:scale-95">
<img alt="Facebook" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWcGcYV7otjE8GNnuIL2x13B1SbCZ0PFn6k3IYR5hG6Opxh159OF5CA3JvXdu7I-q4-kQs_IYRf-dR2RQMUJq2LdtwXU0lklcpwxU5fnpzDv06DSoNZ8w3DuayLZyKmyE2utedguMO7X6V66oajIVTojhzHwv5c5elXusSxh6bsvw36h47WOG7LGH9wi4hZJ0GZPBIn2fXv2jlQMbOSBJNvwYHkFqTvFDDt7ziaCm_W3QWOKaozCrSzcJSK-Jrd4jYw88F6m6SeJQ"/>
<span class="text-sm font-semibold">Facebook</span>
</button>
</div>

<p class="text-on-surface-variant">
                        Chưa có tài khoản? 
                        <a class="text-secondary font-bold hover:underline ml-1" href="#">Đăng ký ngay</a>
</p>
</div>
</div>

<footer class="w-full py-8 bg-white dark:bg-zinc-950 flex justify-center items-center px-6 border-t border-slate-100 dark:border-zinc-800">
<div class="flex flex-col items-center gap-2">
<div class="text-lg font-bold text-green-700 dark:text-green-500">BusGo</div>
<p class="font-['Plus_Jakarta_Sans'] text-sm text-slate-500 dark:text-slate-400">© 2024 BusGo. All rights reserved.</p>
</div>
</footer>
